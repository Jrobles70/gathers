[workspace]
members = [
  "models",
  "retrieval",
  "cli",
  "server"
]
resolver = "2"

[workspace.dependencies]
reqwest = { version = "0.12.5", features = ["json"] }
serde = { version = "*", features = ["derive"] }
serde_json = "1.0.124"
eyre = "0.6.12"
tokio = { version = "1", features = ["full"] }
axum = "0.8.1"

[workspace]
members = ["models", "retrieval", "cli", "server"]
resolver = "2"

[workspace.dependencies]
reqwest = { version = "0.12.28", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.148"
eyre = "0.6.12"
tokio = { version = "1", features = ["full"] }
tracing = "0.1.44"

services:
  server:
    build: .
    ports:
      - "5234:5234"
    volumes:
      - ./data/:/home/app/.local/share/gathers/DB/
    environment:
      - STORAGE_DB_PATH=/home/app/.local/share/gathers/DB/storage.db
      - RETRIEVAL_DB_PATH=/home/app/.local/share/gathers/DB/AllPrintings.db
    restart: unless-stopped
